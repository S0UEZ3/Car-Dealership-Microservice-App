version: '3.8'

services:
  # БД для OrderService
  postgres-order:
    image: postgres:16
    container_name: postgres-order
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # БД для StorageService
  postgres-storage:
    image: postgres:16
    container_name: postgres-storage
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: storage_db
      POSTGRES_USER: storage_user
      POSTGRES_PASSWORD: storage_pass
    volumes:
      - postgres_storage_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage_user -d storage_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP протокол
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak (использует БД order_db)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/:/opt/keycloak/data/import/
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-order:5432/order_db
      KC_DB_USERNAME: order_user
      KC_DB_PASSWORD: order_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: 12345
    depends_on:
      postgres-order:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/master"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_order_data:
  postgres_storage_data: